name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y udev

      - name: Run deterministic tests
        run: make test-unit

      - name: Verify install scripts
        run: bash scripts/install_scripts_test.sh

      - name: Verify workflows
        run: bash scripts/workflows_test.sh

      - name: Build binaries and web assets
        run: make build
